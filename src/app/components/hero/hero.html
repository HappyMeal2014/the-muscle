<section>
  <div
    class="mx-auto grid max-w-7xl grid-cols-1 items-center gap-12 px-6 py-12 md:grid-cols-2 md:gap-8 md:px-12 md:py-20"
  >
    <div class="text-center md:text-left">
      <span
        class="inline-block rounded-full border border-navy-700 bg-brand-blue px-4 py-1.5 text-sm font-medium text-navy-950"
      >
        {{ greeting() }}
      </span>

      <h1 class="mt-6 text-4xl font-bold leading-tight text-white sm:text-5xl md:text-6xl">
        {{ name() }}
      </h1>

      <p class="mt-4 text-lg text-navy-300 md:text-xl">
        {{ tagline() }}
      </p>

      <div class="mt-6 flex items-center justify-center gap-3 md:justify-start">
        <span
          class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full border border-navy-700 text-brand-blue"
        >
          <svg viewBox="0 0 24 24" class="h-4 w-4 stroke-current" fill="none" stroke-width="2">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M3 6.5A1.5 1.5 0 0 1 4.5 5h15A1.5 1.5 0 0 1 21 6.5v11A1.5 1.5 0 0 1 19.5 19h-15A1.5 1.5 0 0 1 3 17.5v-11Z"
            />
            <path stroke-linecap="round" stroke-linejoin="round" d="m4 7 8 6 8-6" />
          </svg>
        </span>
        <a
          [href]="'mailto:' + email()"
          class="text-sm text-navy-300 transition-colors hover:text-brand-blue"
        >
          {{ email() }}
        </a>
      </div>

      <div class="mt-8 flex items-center justify-center gap-4 md:justify-start">
        @for (social of socialLinks(); track social.label) {
          <a
            [href]="social.href"
            [attr.aria-label]="social.label"
            target="_blank"
            rel="noopener"
            class="flex h-10 w-10 items-center justify-center rounded-full bg-brand-blue text-sm font-semibold text-navy-950 transition-colors hover:bg-brand-blue/80"
          >
            @if (social.iconPath) {
              <svg viewBox="0 0 24 24" class="h-4 w-4 fill-current">
                <path [attr.d]="social.iconPath" />
              </svg>
            } @else {
              {{ social.label.charAt(0) }}
            }
          </a>
        }
      </div>
    </div>

    <div class="relative mx-auto flex h-80 w-80 items-center justify-center md:h-96 md:w-96">
      <div class="absolute inset-0 rounded-full bg-navy-800"></div>
      <div
        class="absolute inset-6 overflow-hidden rounded-full border-4 border-navy-950 shadow-2xl md:inset-8"
      >
        @if (photoUrl()) {
          <img [src]="photoUrl()" [alt]="photoAlt()" class="h-full w-full object-cover" />
        } @else {
          <div class="flex h-full w-full items-center justify-center bg-navy-700 text-navy-300">
            <svg viewBox="0 0 24 24" class="h-16 w-16 stroke-current" fill="none" stroke-width="1.5">
              <circle cx="12" cy="8" r="4" />
              <path stroke-linecap="round" d="M4 20c0-4.4 3.6-7 8-7s8 2.6 8 7" />
            </svg>
          </div>
        }
      </div>
    </div>
  </div>
</section>
