<section>
  <div class="mx-auto max-w-2xl px-6 py-12 text-center md:px-12 md:py-20">
    <h1 class="text-3xl font-bold text-white sm:text-4xl md:text-5xl">Technical Skills</h1>

    <div class="mt-8 space-y-6 text-left">
      @for (skill of technicalSkills(); track skill.name) {
        <div>
          <div class="flex items-center justify-between text-sm font-medium text-navy-300">
            <span>{{ skill.name }}</span>
            <span>{{ skill.percentage }}%</span>
          </div>
          <div class="mt-2 h-2 w-full overflow-hidden rounded-full bg-navy-700">
            <div class="h-full rounded-full bg-brand-blue" [style.width.%]="skill.percentage"></div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
