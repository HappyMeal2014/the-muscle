<nav class="mx-auto flex max-w-7xl items-center justify-between px-6 py-6 md:px-12">
  <div class="flex items-center gap-2">
    <!-- tracking-[0.2em]: intentional wide letter-spacing for the wordmark logotype;
         double Tailwind's max built-in step (tracking-widest = 0.1em), no matching token exists. -->
    <span class="text-2xl font-bold whitespace-nowrap tracking-[0.2em] text-white md:text-3xl">{{ wordmark() }}</span>
    <img src="/happy-meal-box-2.png" alt="" class="h-10 w-10 shrink-0 object-contain" />
  </div>

  <ul class="hidden items-center gap-8 md:flex">
    @for (link of navLinks(); track link.label) {
      <li>
        @if (link.path) {
          <a
            [routerLink]="link.path"
            routerLinkActive="bg-brand-blue text-navy-950"
            [routerLinkActiveOptions]="{ exact: link.path === '/' }"
            class="rounded-full px-3 py-1 text-sm font-medium text-navy-300 transition-colors hover:bg-brand-blue/20 hover:text-white"
          >
            {{ link.label }}
          </a>
        } @else {
          <a
            [href]="link.href"
            class="rounded-full px-3 py-1 text-sm font-medium text-navy-300 transition-colors hover:bg-brand-blue/20 hover:text-white"
          >
            {{ link.label }}
          </a>
        }
      </li>
    }
  </ul>

  <button
    type="button"
    class="flex h-10 w-10 items-center justify-center rounded-full bg-brand-blue text-navy-950 transition-colors hover:bg-brand-blue/80 md:hidden"
    (click)="toggleMobileMenu()"
    [attr.aria-expanded]="mobileMenuOpen()"
    aria-label="Toggle navigation menu"
  >
    @if (mobileMenuOpen()) {
      <svg viewBox="0 0 24 24" class="h-5 w-5 stroke-current" fill="none" stroke-width="2">
        <path stroke-linecap="round" d="M6 6l12 12M18 6L6 18" />
      </svg>
    } @else {
      <svg viewBox="0 0 24 24" class="h-5 w-5 stroke-current" fill="none" stroke-width="2">
        <path stroke-linecap="round" d="M4 7h16M4 12h16M4 17h16" />
      </svg>
    }
  </button>
</nav>

@if (mobileMenuOpen()) {
  <ul class="mx-6 mb-6 flex flex-col gap-1 rounded-2xl border border-navy-800 bg-navy-900 p-4 md:hidden">
    @for (link of navLinks(); track link.label) {
      <li>
        @if (link.path) {
          <a
            [routerLink]="link.path"
            routerLinkActive="bg-brand-blue text-navy-950"
            [routerLinkActiveOptions]="{ exact: link.path === '/' }"
            class="block rounded-lg px-3 py-2 text-sm font-medium text-navy-300 transition-colors hover:bg-brand-blue/20 hover:text-white"
            (click)="closeMobileMenu()"
          >
            {{ link.label }}
          </a>
        } @else {
          <a
            [href]="link.href"
            class="block rounded-lg px-3 py-2 text-sm font-medium text-navy-300 transition-colors hover:bg-brand-blue/20 hover:text-white"
            (click)="closeMobileMenu()"
          >
            {{ link.label }}
          </a>
        }
      </li>
    }
  </ul>
}
